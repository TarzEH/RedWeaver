map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve DNS every 30s so backend restarts don't cause 502s
    resolver 127.0.0.11 valid=30s;
    set $backend_upstream http://web:8000;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # REST API (DRF)
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # WebSocket event stream (Django Channels)
    location /ws/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # Django admin (primary debug surface) + DRF browsable API
    location /admin/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Collected static (admin/DRF) served by whitenoise; screenshot media.
    location /static/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
    }
    location /media/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
    }
}
