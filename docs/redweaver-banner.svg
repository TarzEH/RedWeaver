<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060a13"/>
      <stop offset="100%" style="stop-color:#0d1520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="webGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bg)" rx="12"/>

  <!-- Subtle border -->
  <rect width="900" height="220" fill="none" stroke="#1e2a3a" stroke-width="1" rx="12"/>

  <!-- Web pattern (left side) -->
  <g opacity="0.15" stroke="#00d4aa" stroke-width="0.8" fill="none">
    <!-- Radial web lines from center point -->
    <line x1="110" y1="110" x2="30" y2="30"/>
    <line x1="110" y1="110" x2="110" y2="20"/>
    <line x1="110" y1="110" x2="190" y2="30"/>
    <line x1="110" y1="110" x2="210" y2="110"/>
    <line x1="110" y1="110" x2="190" y2="190"/>
    <line x1="110" y1="110" x2="110" y2="200"/>
    <line x1="110" y1="110" x2="30" y2="190"/>
    <line x1="110" y1="110" x2="10" y2="110"/>
    <!-- Ring 1 -->
    <path d="M 80,55 Q 110,48 140,55 Q 155,80 155,110 Q 155,140 140,165 Q 110,172 80,165 Q 65,140 65,110 Q 65,80 80,55 Z"/>
    <!-- Ring 2 -->
    <path d="M 55,35 Q 110,22 165,35 Q 195,60 195,110 Q 195,160 165,185 Q 110,198 55,185 Q 25,160 25,110 Q 25,60 55,35 Z"/>
  </g>

  <!-- Web pattern (right side) -->
  <g opacity="0.08" stroke="#06b6d4" stroke-width="0.6" fill="none" transform="translate(700, 110)">
    <line x1="0" y1="0" x2="-80" y2="-80"/>
    <line x1="0" y1="0" x2="0" y2="-90"/>
    <line x1="0" y1="0" x2="80" y2="-80"/>
    <line x1="0" y1="0" x2="100" y2="0"/>
    <line x1="0" y1="0" x2="80" y2="80"/>
    <line x1="0" y1="0" x2="0" y2="90"/>
    <line x1="0" y1="0" x2="-80" y2="80"/>
    <line x1="0" y1="0" x2="-100" y2="0"/>
    <path d="M -40,-35 Q 0,-45 40,-35 Q 55,-15 55,0 Q 55,15 40,35 Q 0,45 -40,35 Q -55,15 -55,0 Q -55,-15 -40,-35 Z"/>
    <path d="M -65,-60 Q 0,-75 65,-60 Q 85,-25 85,0 Q 85,25 65,60 Q 0,75 -65,60 Q -85,25 -85,0 Q -85,-25 -65,-60 Z"/>
  </g>

  <!-- Interconnected nodes (agent network) -->
  <g filter="url(#glow)">
    <!-- Center node -->
    <circle cx="110" cy="110" r="6" fill="#00d4aa" opacity="0.9"/>
    <!-- Satellite nodes -->
    <circle cx="60" cy="60" r="3.5" fill="#06b6d4" opacity="0.7"/>
    <circle cx="160" cy="60" r="3.5" fill="#f97316" opacity="0.7"/>
    <circle cx="60" cy="160" r="3.5" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="160" cy="160" r="3.5" fill="#ef4444" opacity="0.7"/>
    <circle cx="110" cy="40" r="3" fill="#eab308" opacity="0.6"/>
    <circle cx="110" cy="180" r="3" fill="#22c55e" opacity="0.6"/>
    <circle cx="40" cy="110" r="3" fill="#06b6d4" opacity="0.6"/>
    <circle cx="180" cy="110" r="3" fill="#f97316" opacity="0.6"/>
    <!-- Connecting lines -->
    <g stroke="#00d4aa" stroke-width="1" opacity="0.25">
      <line x1="110" y1="110" x2="60" y2="60"/>
      <line x1="110" y1="110" x2="160" y2="60"/>
      <line x1="110" y1="110" x2="60" y2="160"/>
      <line x1="110" y1="110" x2="160" y2="160"/>
      <line x1="110" y1="110" x2="110" y2="40"/>
      <line x1="110" y1="110" x2="110" y2="180"/>
      <line x1="110" y1="110" x2="40" y2="110"/>
      <line x1="110" y1="110" x2="180" y2="110"/>
    </g>
  </g>

  <!-- Shield icon -->
  <g transform="translate(96, 95)" fill="none" stroke="#00d4aa" stroke-width="2" opacity="0.8">
    <path d="M 14,2 L 2,8 L 2,16 C 2,22 7,27 14,30 C 21,27 26,22 26,16 L 26,8 Z"/>
    <path d="M 9,16 L 13,20 L 20,12" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Main title -->
  <text x="250" y="105" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="56" font-weight="800" letter-spacing="-1" filter="url(#textGlow)">
    <tspan fill="#e6edf3">Red</tspan><tspan fill="url(#accent)">Weaver</tspan>
  </text>

  <!-- Tagline -->
  <text x="253" y="140" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#5c6f82" font-weight="400" letter-spacing="2">
    AI-POWERED MULTI-AGENT BUG HUNTING
  </text>

  <!-- Accent line -->
  <rect x="250" y="152" width="120" height="2" fill="url(#accent)" rx="1" opacity="0.6"/>

  <!-- Version badge -->
  <g transform="translate(780, 20)">
    <rect width="90" height="24" rx="12" fill="#00d4aa" fill-opacity="0.1" stroke="#00d4aa" stroke-opacity="0.3" stroke-width="1"/>
    <text x="45" y="16" font-family="system-ui, sans-serif" font-size="11" fill="#00d4aa" text-anchor="middle" font-weight="600">v0.1.0-beta</text>
  </g>
</svg>
