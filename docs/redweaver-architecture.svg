  <text x="735" y="315" text-anchor="middle" fill="#64748b" font-size="8.5">EventLog · GraphSnapshot</text>
  <text x="735" y="328" text-anchor="middle" fill="#64748b" font-size="8.5">Screenshot · AgentTransition</text>

  <rect x="630" y="342" width="210" height="40" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
