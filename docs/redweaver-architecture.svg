  <rect x="165" y="84" width="105" height="26" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="217" y="101" text-anchor="middle" fill="#e2e8f0" font-size="9">Hunt</text>
  <rect x="278" y="84" width="105" height="26" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="330" y="101" text-anchor="middle" fill="#e2e8f0" font-size="9">Findings</text>
  <rect x="391" y="84" width="105" height="26" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="443" y="101" text-anchor="middle" fill="#e2e8f0" font-size="9">Sessions</text>
  <rect x="504" y="84" width="105" height="26" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="556" y="101" text-anchor="middle" fill="#e2e8f0" font-size="9">Debug</text>
  <rect x="617" y="84" width="105" height="26" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="669" y="101" text-anchor="middle" fill="#e2e8f0" font-size="9">Knowledge</text>
  <rect x="730" y="84" width="105" height="26" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="782" y="101" text-anchor="middle" fill="#e2e8f0" font-size="9">Settings</text>

