  <polygon points="235,438 240,448 245,438" fill="#3b82f6"/>
  <text x="255" y="438" fill="#60a5fa" font-size="8.5">ORM</text>
  <line x1="660" y1="423" x2="660" y2="443" stroke="#34d399" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="655,438 660,448 665,438" fill="#34d399"/>
  <text x="675" y="438" fill="#34d399" font-size="8.5">events · tasks</text>

