  <text x="240" y="466" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600">PostgreSQL — system of record</text>
  <text x="240" y="484" text-anchor="middle" fill="#94a3b8" font-size="9.5">runs · findings · observability · reports</text>
  <text x="240" y="499" text-anchor="middle" fill="#34d399" font-size="9" font-weight="500">+ pgvector RAG (knowledge base embeddings)</text>

  <rect x="460" y="443" width="400" height="66" rx="10" fill="#111827" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="660" y="466" text-anchor="middle" fill="#f87171" font-size="12" font-weight="600">Redis — transport only</text>
  <text x="660" y="484" text-anchor="middle" fill="#94a3b8" font-size="9.5">Channels layer · Celery broker</text>
  <text x="660" y="499" text-anchor="middle" fill="#94a3b8" font-size="9">live pub/sub (no persisted state)</text>

