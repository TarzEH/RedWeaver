  <text x="450" y="553" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="600" letter-spacing="1.5">DOCKER — SECURITY TOOLS (worker image)</text>

  <!-- row 1 -->
  <rect x="55"  y="568" width="120" height="28" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="115" y="586" text-anchor="middle" fill="#e2e8f0" font-size="9">nmap</text>
  <rect x="185" y="568" width="120" height="28" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="245" y="586" text-anchor="middle" fill="#e2e8f0" font-size="9">subfinder</text>
  <rect x="315" y="568" width="120" height="28" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="375" y="586" text-anchor="middle" fill="#e2e8f0" font-size="9">httpx</text>
  <rect x="445" y="568" width="120" height="28" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="505" y="586" text-anchor="middle" fill="#e2e8f0" font-size="9">nuclei</text>
  <rect x="575" y="568" width="120" height="28" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="635" y="586" text-anchor="middle" fill="#e2e8f0" font-size="9">nikto</text>
  <rect x="705" y="568" width="120" height="28" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="765" y="586" text-anchor="middle" fill="#e2e8f0" font-size="9">whatweb</text>

  <!-- row 2 -->
  <rect x="189" y="604" width="120" height="28" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="249" y="622" text-anchor="middle" fill="#e2e8f0" font-size="9">ffuf</text>
  <rect x="323" y="604" width="120" height="28" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="383" y="622" text-anchor="middle" fill="#e2e8f0" font-size="9">gobuster</text>
  <rect x="457" y="604" width="120" height="28" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="517" y="622" text-anchor="middle" fill="#e2e8f0" font-size="9">katana</text>
  <rect x="591" y="604" width="120" height="28" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="651" y="622" text-anchor="middle" fill="#e2e8f0" font-size="9">theHarvester</text>

  <text x="450" y="654" text-anchor="middle" fill="#64748b" font-size="8.5">async subprocess execution · stdout/stderr/exit-code captured to ToolExecution</text>
</svg>
