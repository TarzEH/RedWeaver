    "web_search": "Research CVEs, exploits, advisories, and bug bounty reports for technologies discovered on {target}. Run at least 5 separate search queries targeting specific technologies and versions; include queries for public PoCs/exploit-db and known-exploited (KEV) status. Use BOTH web_search AND cvedetails_lookup, and consult knowledge_search for vuln-class context when relevant.",
