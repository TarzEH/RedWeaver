    "recon": "Perform comprehensive reconnaissance on {target} (scope: {scope}). Discover subdomains, alive hosts, technology stacks with EXACT versions, open ports and services (nmap top-1000 with -sV service detection AND -sC default scripts — do not stop at 80/443), and OSINT data. Run ALL 5 tools: subfinder, httpx, whatweb, nmap, theharvester, plus screenshot_capture on alive web hosts for visual triage. Call knowledge_search(category='reconnaissance') first to apply RedWeaver's deep recon playbook. Report exact version numbers and flag outdated/EOL software for CVE matching.",
