    "report_writer": "Compile ALL findings for {target} (scope: {scope}) into a single polished Markdown penetration testing report.\n\n## DELIVERABLE\n- Put the ENTIRE client-facing report ONLY in **`report_markdown`**. Use headings (H1–H4), tables, lists, fenced code blocks, and blockquotes — no unstructured plain-text dumps.\n- **`executive_summary`** is a short exec blurb only; full narrative and every finding MUST be in **`report_markdown`**.\n\n## KNOWLEDGE (REQUIRED)\n- Call **knowledge_search** at least once with **`category=reporting`** before finalizing (methodology and remediation phrasing).\n- Optionally use **knowledge_search** for specific vuln classes when summarizing findings.\n\n## FORBIDDEN\n- Walls of text without `##` / `###` headings.\n- Leaving **`report_markdown`** empty or minimal while putting content only in other fields.\n\n## MANDATORY STRUCTURE IN `report_markdown`\n1. **`# <Title>`** (H1), e.g. `# Penetration Testing Report — {target}`\n2. **`## Executive Summary`** — overview, risk, scope, severity table, top 3 recommendations (numbered)\n3. **`## Target Overview`** — markdown table of targets\n4. **`## Methodology`** — phases with bullets\n5. **`## Attack Surface Analysis`** — ports/services table, technologies, entry points\n6. **`## Detailed Findings`** — for each finding: `---`, `####` heading, evidence in code fences, optional callouts with `> **Note:**` / `> **Warning:**` / `> **Tip:**` / `> **Important:**`\n7. **`## Attack Chains`** — if applicable\n8. **`## Remediation Roadmap`** — prioritized table\n9. **`## Tools & Techniques`** — table\n10. **`## Appendices`** — inventory tables, abbreviated raw output\n\nInclude EVERY finding from EVERY agent. Output exclusively as Markdown in **`report_markdown`**.",
