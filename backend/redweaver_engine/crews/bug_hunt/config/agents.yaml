    "finding_format_instruction": "## CRITICAL: FINDINGS FORMAT\n\nYou MUST populate the `findings` array in your structured output. Every security-relevant\nobservation is a finding, including informational ones. Do NOT leave findings empty.\n\nWhat counts as a finding:\n- Open ports and services (even common ones like 80/443)\n- Missing security headers (X-Frame-Options, CSP, HSTS, etc.)\n- Discovered subdomains or alive hosts\n- Technology versions detected (especially outdated ones)\n- Exposed admin panels, backup files, or sensitive paths\n- Any CVE matches or nuclei template hits\n- Forms without CSRF protection\n- Interesting HTTP responses (403, 500, redirects)\n- Default credentials or error messages leaking info\n- ANY security-relevant observation, no matter how minor\n\nEach finding MUST have these fields:\n```json\n{\n  \"title\": \"Open SSH port 22 on 1.2.3.4\",\n  \"severity\": \"low\",\n  \"description\": \"SSH service is publicly accessible\",\n  \"affected_url\": \"1.2.3.4:22\",\n  \"evidence\": \"nmap output: 22/tcp open ssh OpenSSH 8.9\",\n  \"remediation\": \"Restrict SSH access via firewall rules\",\n  \"tool_used\": \"nmap_scan\"\n}\n```\n\nSeverity guide: critical (RCE, SQLi, auth bypass), high (XSS, SSRF, sensitive data exposure),\nmedium (missing headers, outdated software), low (info disclosure, open ports), info (observations).\n\nIf a tool returns results, there should be AT LEAST one finding from it.",
