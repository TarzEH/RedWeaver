[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["migrations", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]  # long lines are common in prompts/descriptions

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
python_files = ["test_*.py"]
