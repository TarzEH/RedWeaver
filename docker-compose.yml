# RedWeaver — Django (DRF + Channels) + Postgres + Redis + Celery + Playwright
# web/worker/migrate share one image (./backend), differing only by command.

x-backend-env: &backend_env
  PYTHONUNBUFFERED: "1"
  DJANGO_SETTINGS_MODULE: redweaver.settings
  DJANGO_ENV: ${DJANGO_ENV:-dev}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure-change-me}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:5173,http://localhost:8001}
  DATABASE_URL: postgres://${POSTGRES_USER:-redweaver}:${POSTGRES_PASSWORD:-redweaver}@postgres:5432/${POSTGRES_DB:-redweaver}
  REDIS_URL: redis://redis:6379/0
  CHANNEL_LAYERS_URL: redis://redis:6379/1
  CELERY_BROKER_URL: redis://redis:6379/2
  CELERY_RESULT_BACKEND: django-db
  SCREENSHOTS_DIR: /app/media/screenshots
  MEDIA_ROOT: /app/media
  KNOWLEDGE_SERVICE_URL: http://knowledge:8100
  KB_EMBED_PROVIDER: ${KB_EMBED_PROVIDER:-openai}
  KB_EMBED_MODEL: ${KB_EMBED_MODEL:-}
  KB_EMBED_DIM: ${KB_EMBED_DIM:-}
  KB_EMBED_DEVICE: ${KB_EMBED_DEVICE:-cpu}
  HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-}
  TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-}
  HF_HOME: /app/data/hf-cache
  JWT_SECRET: ${JWT_SECRET:-}
  DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@redweaver.local}
  DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
  DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-admin}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
  MODEL_PROVIDER: ${MODEL_PROVIDER:-}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  CREW_EXECUTOR_WORKERS: ${CREW_EXECUTOR_WORKERS:-4}

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-redweaver}
      POSTGRES_USER: ${POSTGRES_USER:-redweaver}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-redweaver}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-redweaver} -d ${POSTGRES_DB:-redweaver}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  knowledge:
    build: ./knowledge-service
    ports:
      - "8100:8100"
    volumes:
      - ./knowledge-base:/data/knowledge:ro
      - knowledge_model_cache:/root/.cache/chroma
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  migrate:
    build: ./backend
    command: ["/app/entrypoint.sh", "migrate"]
    environment: *backend_env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - ./knowledge-base:/app/knowledge-base:ro
      - static_data:/app/staticfiles
      - screenshots_data:/app/media/screenshots
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  web:
    build: ./backend
    command: ["/app/entrypoint.sh", "web"]
    ports:
      - "8001:8000"
    environment: *backend_env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - ./knowledge-base:/app/knowledge-base:ro
      - static_data:/app/staticfiles
      - screenshots_data:/app/media/screenshots
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build: ./backend
    command: ["/app/entrypoint.sh", "worker"]
    environment: *backend_env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - ./knowledge-base:/app/knowledge-base:ro
      - screenshots_data:/app/media/screenshots
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  beat:
    build: ./backend
    command: ["/app/entrypoint.sh", "beat"]
    environment: *backend_env
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: ""
    ports:
      - "5173:80"
    depends_on:
      web:
        condition: service_healthy

  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "5541:5540"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
  knowledge_model_cache:
  static_data:
  screenshots_data:
